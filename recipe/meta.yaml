{% set name = "pyportfolioopt" %}
{% set version = "1.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyportfolioopt-{{ version }}.tar.gz
  sha256: de5ea1914d6ca6bc83c54a954be123bd9c770275c769d1d70fb8760092cd5e9b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - poetry
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - cvxpy >=1.1.19
    - numpy >=1.26.0
    - pandas >=0.19
    - scipy >=1.3
  run_constrained:
    - matplotlib-base >=3.2
    - scikit-learn >=0.24.1

test:
  imports:
    - pypfopt
  # commands:
  #  - pip check
  requires:
    - python {{ python_min }}
  #  - pip

about:
  home: https://github.com/robertmartin8/PyPortfolioOpt
  summary: Financial portfolio optimization in python
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - timkpaine
    - atrawog
